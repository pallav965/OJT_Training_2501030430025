<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nike Style Header</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* HEADER */
    .header {
      width: 100%;
      background: #000;
      padding: 18px 40px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    /* LOGO */
    .logo {
      color: white;
      font-size: 42px;
      font-weight: bold;
      transform: skewX(-20deg);
    }

    /* MENU */
    .nav-links {
      display: flex;
      gap: 42px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 15px;
      position: relative;
      transition: 0.3s;
    }

    /* underline effect */
    .nav-links a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      background: white;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a:hover {
      color: #aaa;
    }

    /* ICONS */
    .icons {
      display: flex;
      gap: 22px;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .icon {
      transition: 0.3s;
    }

    .icon:hover {
      color: #aaa;
    }

    /* SEARCH BOX */
    .search-box {
      position: absolute;
      top: 70px;
      right: 40px;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .search-box input {
      padding: 8px 10px;
      border: none;
      outline: none;
      background: black;
      color: white;
      border-radius: 5px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 20px;
      }

      .nav-links {
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .search-box {
        right: 20px;
      }
    }
  </style>

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

<header class="header">
  <nav class="navbar">

    <!-- Logo -->
    <div class="logo">✓</div>

    <!-- Navigation -->
    <ul class="nav-links">
      <li><a href="#">New Releases</a></li>
      <li><a href="#">Mens</a></li>
      <li><a href="#">Women</a></li>
      <li><a href="#">Sale</a></li>
      <li><a href="#">Collaboration</a></li>
    </ul>

    <!-- Icons -->
    <div class="icons">
      <i class="fa-solid fa-magnifying-glass icon" id="search-btn"></i>
      <i class="fa-solid fa-cart-shopping icon"></i>
      <i class="fa-regular fa-heart icon"></i>
      <i class="fa-regular fa-user icon"></i>
    </div>

    <!-- Search Box -->
    <div class="search-box" id="search-box">
      <input type="text" placeholder="Search..." />
    </div>

  </nav>
</header>

<!-- JS -->
<script>
  const searchBtn = document.getElementById("search-btn");
  const searchBox = document.getElementById("search-box");

  searchBtn.addEventListener("click", () => {
    searchBox.style.display =
      searchBox.style.display === "block" ? "none" : "block";
  });
</script>

</body>
</html>
